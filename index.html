   <head> 
      <title>HTML5-Canvas</title>  
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <meta name="mobile-web-app-capable" content="yes">

<script>
   function drawRect() { //This draws a rectangle on the canvas
	var a_canvas = document.getElementById('a'); //this variable calls the canvas using an id
	var a_context = a_canvas.getContext('2d'); //sets canvas to 2 dimensional
	a_context.fillStyle = "#808080"; // rectangle is grey
	a_context.fillRect(5, 5, 175, 100);//sets coordinates and placement of rectangle

};
function my_name() {//this function displays my name, "Alexandria"
	var a_canvas = document.getElementById('a'); //this variable calls the canvas using an id
	var a_context = a_canvas.getContext('2d'); //sets canvas to 2 dimensional
	a_context.font = "30px Times New Roman"; // adds font for my name and size
	a_context.fillStyle = "#000000"; // sets color of text to black
	a_context.fillText ("Abby", 10, 150); //adds name text and coordinates for my name
}; 
function my_image() {//this function displays my chosen image
	var a_canvas =document.getElementById('a'); //this variable calls the canvas using an id
	var a_context = a_canvas.getContext('2d'); //sets canvas to 2 dimensional
	var pigimg = document.getElementById('pigimg');//pulls longhorn image
	a_context.drawImage(pigimg, 5, 5, 100, 100);//draws image with size created by 4 numbers

};
function clear_canvas() {//this function clears the canvas
	var a_canvas =document.getElementById('a');//this variable calls the canvas using an id
 	a_canvas.width = a_canvas.width; // causes the canvas to clear
};


var docMod = document.lastModified; // loads last modified time stamp into docMod variable
//alert("This file last modified " + docMod); // generates alert box with last modified time stamp. un-comment out this entire line if you want to use.
console.log("This file last modified " + docMod); // generates message in javaScript console (found in developers tools) with time stamp. 
</script>



<style>	

</style>

<body>
<div id="header" class="w3-container w3-flat-carrot">
	<h1>HTML5-Canvas</h1>
</div>
	
<div id="content" class="w3-container">
	<p>Content goes here.</p>

	<canvas id="a" width="300" height="190" style="border:2px solid #000000;"></canvas><!--this is where I added a canvas page; it adds an empty black box-->

   <p> Click the buttons below to create a work of art! </p> <!-- This is text to tell the user that they can make an image-->

   <a onclick="drawRect();" class="w3-btn w3-grey w3-round"> Draw Rectangle!</a> <!--this will draw a rectangle on the box-->

   <a onclick="my_name();" class="w3-btn w3-grey w3-round"> Write name!</a> <!--this button will write your name in the box-->

   <img id='pigimg' src='https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT3J3VfHdmUD6xCif554vF4YiDhpRECH9xFKQ&s' alt='Image of Pig' class='hidden' width='0' height='0'> <!-- this adds in the code for the image of the pig-->

   <a onclick="my_image();" class="w3-btn w3-grey w3-round"> Draw image! </a> <!--this will add the image in-->
   
   <a onclick="clear_canvas();" class="w3-btn w3-grey w3-round"> Clear Canvas!</a> <!--this will clear the canvas-->

</div>
	
<footer class="w3-bottom w3-container w3-flat-carrot">
	<p>DIY!</p>
